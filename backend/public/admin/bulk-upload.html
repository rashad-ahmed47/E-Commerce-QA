<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Upload - Admin</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .nav-link.exit-btn { border: 1px solid var(--border-default); padding: var(--sp-1) var(--sp-3); border-radius: var(--radius-full); margin-left: var(--sp-4); }
        .nav-link.exit-btn:hover { background: var(--bg-card); color: var(--text-primary); }
        
        .upload-zone {
            border: 2px dashed var(--border-default);
            border-radius: var(--radius-xl);
            padding: var(--sp-12) var(--sp-8);
            text-align: center;
            transition: all var(--duration-base) var(--ease-default);
            cursor: pointer;
            background: var(--gray-50);
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary-500);
            background: var(--primary-50);
        }
        .upload-icon {
            color: var(--text-tertiary);
            transition: color var(--duration-base) var(--ease-default);
            margin: 0 auto var(--sp-4) auto;
            width: 64px;
            height: 64px;
        }
        .upload-zone:hover .upload-icon, .upload-zone.dragover .upload-icon {
            color: var(--primary-500);
        }
        .upload-title {
            font-size: var(--text-xl);
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: var(--sp-2);
        }
        .upload-title.has-file { color: var(--primary-600); }
        .upload-subtitle {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .info-box {
            display: inline-block;
            background: var(--info-50);
            border: 1px solid var(--info-100);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            text-align: left;
            margin-top: var(--sp-4);
        }
        .info-box-title { font-size: var(--text-sm); color: var(--info-800); font-weight: 600; margin-bottom: var(--sp-2); }
        .info-code { color: var(--primary-600); font-family: monospace; font-size: var(--text-sm); background: #fff; padding: var(--sp-1) var(--sp-2); border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); }
        
        .status-msg {
            margin-top: var(--sp-8);
            padding: var(--sp-4);
            border-radius: var(--radius-xl);
            font-weight: 600;
            text-align: center;
            border: 1px solid transparent;
        }
        .status-msg.processing { background: var(--info-50); color: var(--info-700); border-color: var(--info-200); }
        .status-msg.success { background: var(--success-50); color: var(--success-700); border-color: var(--success-200); }
        .status-msg.error { background: var(--danger-50); color: var(--danger-700); border-color: var(--danger-200); }
    </style>
</head>
<body style="background: var(--gray-50);">
    <nav class="nav">
        <div class="nav-inner">
            <a href="/admin/dashboard.html" class="nav-brand">E-SHOP <span style="color: var(--text-tertiary); font-size: var(--text-lg); font-weight: 400; margin-left: 8px;">/ Admin</span></a>
            <div class="nav-links">
                <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/admin/returns.html" class="nav-link">Returns</a>
                <a href="/admin/bulk-upload.html" class="nav-link active">Bulk Upload</a>
                <a href="/admin/promotions.html" class="nav-link">Promotions</a>
                <a href="/" class="nav-link exit-btn">Exit Admin</a>
            </div>
        </div>
    </nav>

    <main class="container main-content mt-8" style="max-width: 768px;">
        <div class="glass-card animate-slide" style="padding: var(--sp-10);">
            <div style="text-align: center; margin-bottom: var(--sp-8);">
                <h1 class="section-title">Bulk Product Upload</h1>
                <p class="section-subtitle" style="font-size: var(--text-lg); margin-bottom: 0;">Upload a CSV file to add multiple products at once.</p>
                <div class="info-box">
                    <p class="info-box-title">Required CSV Columns:</p>
                    <code class="info-code">name, sku, description, price, category, stockQuantity</code>
                </div>
            </div>
            
            <form id="bulkForm" style="display: flex; flex-direction: column; gap: var(--sp-8);">
                <div class="upload-zone" id="dropZone">
                    <input type="file" id="bulkFile" accept=".csv" style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;" required>
                    <div style="pointer-events: none;">
                        <i data-lucide="upload-cloud" class="upload-icon"></i>
                        <p class="upload-title" id="fileName">Click to upload or drag and drop</p>
                        <p class="upload-subtitle">CSV files only, max 5MB</p>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="uploadBtn">
                    <i data-lucide="upload"></i> Start Bulk Import
                </button>
            </form>
            
            <div id="statusMessage" class="status-msg hidden animate-fade"></div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        lucide.createIcons();

        const fileInput = document.getElementById('bulkFile');
        const fileName = document.getElementById('fileName');
        const dropZone = document.getElementById('dropZone');
        const status = document.getElementById('statusMessage');
        const uploadBtn = document.getElementById('uploadBtn');

        // Drag and drop effects
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                fileName.innerText = e.target.files[0].name;
                fileName.classList.add('has-file');
            } else {
                fileName.innerText = 'Click to upload or drag and drop';
                fileName.classList.remove('has-file');
            }
        });

        document.getElementById('bulkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<div class="spinner" style="margin-right: 8px; border-top-color: #fff; width: 16px; height: 16px;"></div> Processing...';
            
            status.innerText = 'Uploading and processing records...';
            status.className = 'status-msg processing animate-fade block';

            try {
                // Since we need to remove Content-Type header that Auth.getHeaders() might add
                // We actually need to create custom headers without Content-Type
                const customHeaders = new Headers();
                customHeaders.append('Authorization', `Bearer ${Auth.getToken()}`);

                const finalRes = await fetch('/api/products/bulk', {
                    method: 'POST',
                    headers: customHeaders,
                    body: formData
                });

                const data = await finalRes.json();
                if (!finalRes.ok) throw new Error(data.message || 'Upload failed');

                status.innerText = data.message || 'Successfully imported products';
                status.className = 'status-msg success animate-fade block';
                Toast.success('Import complete');
                fileInput.value = '';
                fileName.innerText = 'Click to upload or drag and drop';
                fileName.classList.remove('has-file');
            } catch (err) {
                status.innerText = err.message;
                status.className = 'status-msg error animate-fade block';
                Toast.error('Import failed');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i data-lucide="upload" style="width: 18px; height: 18px; margin-right: 8px;"></i> Start Bulk Import';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
