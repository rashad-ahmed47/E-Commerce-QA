<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotions - Admin</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .nav-link.exit-btn { border: 1px solid var(--border-default); padding: var(--sp-1) var(--sp-3); border-radius: var(--radius-full); margin-left: var(--sp-4); }
        .nav-link.exit-btn:hover { background: var(--bg-card); color: var(--text-primary); }
        
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--sp-8); }
        
        .promo-name { font-weight: 700; color: var(--text-primary); }
        .promo-discount { font-weight: 700; color: var(--primary-600); }
        .promo-date { font-size: var(--text-sm); color: var(--text-secondary); }
        .action-btn { color: var(--danger-500); transition: color var(--duration-fast); padding: var(--sp-1); border-radius: var(--radius-md); }
        .action-btn:hover { color: var(--danger-700); background: var(--danger-50); }
        
        .modal-body-scroll { max-height: 80vh; overflow-y: auto; padding-right: var(--sp-2); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
        .checkbox-label { display: flex; align-items: center; gap: var(--sp-2); cursor: pointer; color: var(--text-secondary); font-size: var(--text-sm); font-weight: 500; }
        .checkbox-input { width: 16px; height: 16px; accent-color: var(--primary-500); }
    </style>
</head>
<body style="background: var(--gray-50);">
    <nav class="nav">
        <div class="nav-inner">
            <a href="/admin/dashboard.html" class="nav-brand">E-SHOP <span style="color: var(--text-tertiary); font-size: var(--text-lg); font-weight: 400; margin-left: 8px;">/ Admin</span></a>
            <div class="nav-links">
                <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/admin/returns.html" class="nav-link">Returns</a>
                <a href="/admin/bulk-upload.html" class="nav-link">Bulk Upload</a>
                <a href="/admin/promotions.html" class="nav-link active">Promotions</a>
                <a href="/" class="nav-link exit-btn">Exit Admin</a>
            </div>
        </div>
    </nav>

    <main class="container main-content mt-8">
        <div class="header-action">
            <div>
                <h1 class="section-title" style="margin: 0;">Manage Promotions</h1>
                <p class="section-subtitle" style="margin: var(--sp-1) 0 0 0;">Create and manage sitewide or product-specific discounts.</p>
            </div>
            <button onclick="toggleModal('promoModal')" class="btn btn-primary" style="box-shadow: var(--shadow-md);">
                <i data-lucide="plus"></i> New Promotion
            </button>
        </div>
        
        <div class="table-wrap animate-slide">
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Discount</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="promoTable">
                    <tr><td colspan="6" style="text-align: center; padding: var(--sp-12);"><div class="spinner" style="margin: 0 auto; border-top-color: var(--primary-500);"></div></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Create Promotion Modal -->
    <div id="promoModal" class="modal-overlay hidden">
        <div class="modal" id="promoModalContent">
            <div class="modal-header">
                <h2 style="font-size: var(--text-xl); font-weight: 800;">Create Promotion</h2>
                <button onclick="toggleModal('promoModal')" style="color: var(--text-tertiary); transition: color var(--duration-fast);">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div class="modal-body modal-body-scroll">
                <form id="promoForm" style="display: flex; flex-direction: column; gap: var(--sp-4);">
                    <div class="form-group">
                        <label class="form-label">Promotion Name</label>
                        <input type="text" id="promoName" required class="form-input" placeholder="e.g. Summer Sale 2024">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Discount Percentage</label>
                        <input type="number" id="promoDiscount" required min="1" max="100" class="form-input" placeholder="20">
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Start Date</label>
                            <input type="datetime-local" id="promoStart" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">End Date</label>
                            <input type="datetime-local" id="promoEnd" required class="form-input">
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: var(--sp-2);">
                        <label class="checkbox-label">
                            <input type="checkbox" id="promoActive" checked class="checkbox-input">
                            <span>Active Immediately</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: var(--sp-4);">Create Promotion</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        lucide.createIcons();

        function toggleModal(id) {
            const modal = document.getElementById(id);
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        async function loadPromotions() {
            try {
                const res = await fetch('/api/promotions', { headers: Auth.getHeaders() });
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();
                
                const table = document.getElementById('promoTable');
                if (data.length === 0) {
                    table.innerHTML = '<tr><td colspan="6" class="empty-state" style="padding: var(--sp-8); color: var(--text-secondary);">No promotions found.</td></tr>';
                    return;
                }

                table.innerHTML = data.map(promo => {
                    const isActive = promo.isActive && new Date(promo.startDate) <= new Date() && new Date(promo.endDate) >= new Date();
                    const statusClass = isActive ? 'badge-success' : 'badge-neutral';
                    const statusText = isActive ? 'Active' : 'Inactive';
                    
                    return `
                    <tr>
                        <td><span class="promo-name">${promo.name}</span></td>
                        <td><span class="promo-discount">${promo.discountPercent}% OFF</span></td>
                        <td><span class="promo-date">${new Date(promo.startDate).toLocaleString()}</span></td>
                        <td><span class="promo-date">${new Date(promo.endDate).toLocaleString()}</span></td>
                        <td>
                            <span class="badge ${statusClass}">${statusText}</span>
                        </td>
                        <td>
                            <button onclick="deletePromo('${promo._id}')" class="action-btn">
                                <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                            </button>
                        </td>
                    </tr>
                `}).join('');
                lucide.createIcons();
            } catch (err) {
                Toast.error('Could not load promotions');
                document.getElementById('promoTable').innerHTML = '<tr><td colspan="6" class="empty-state" style="padding: var(--sp-8); color: var(--danger-500);">Error loading data.</td></tr>';
            }
        }

        document.getElementById('promoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                name: document.getElementById('promoName').value,
                discountPercent: document.getElementById('promoDiscount').value,
                startDate: document.getElementById('promoStart').value,
                endDate: document.getElementById('promoEnd').value,
                isActive: document.getElementById('promoActive').checked
            };

            try {
                const res = await fetch('/api/promotions', {
                    method: 'POST',
                    headers: {
                        ...Auth.getHeaders(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) throw new Error('Failed to create promotion');
                
                Toast.success('Promotion created');
                toggleModal('promoModal');
                document.getElementById('promoForm').reset();
                loadPromotions();
            } catch (err) {
                Toast.error(err.message);
            }
        });

        async function deletePromo(id) {
            if (!confirm('Are you sure you want to delete this promotion?')) return;
            try {
                const res = await fetch(`/api/promotions/${id}`, {
                    method: 'DELETE',
                    headers: Auth.getHeaders()
                });
                if (!res.ok) throw new Error('Failed to delete');
                Toast.success('Promotion deleted');
                loadPromotions();
            } catch (err) {
                Toast.error(err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadPromotions);
    </script>
</body>
</html>
