<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - E-SHOP</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--gray-50);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-slide">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-extrabold text-primary-600 tracking-tight">E-SHOP</a>
        </div>

        <div class="card p-8 shadow-xl border-gray-100">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="key" class="w-8 h-8 text-primary-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Forgot Password?</h2>
                <p class="text-gray-500 mt-2 text-sm">No worries, we'll send you reset instructions.</p>
            </div>
            
            <form id="forgotForm" class="space-y-5">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" required class="form-input w-full" placeholder="Enter your email address">
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-block btn-lg mt-6">
                    Reset Password
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-medium">
                <a href="/login.html" class="text-gray-500 hover:text-gray-900 flex items-center justify-center gap-1 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to log in
                </a>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        lucide.createIcons();

        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner border-white mr-2"></div> Sending...';

            try {
                await Utils.fetchApi('/api/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });
                
                // Show success state
                document.querySelector('.card').innerHTML = `
                    <div class="text-center">
                        <div class="w-16 h-16 bg-success-50 rounded-full flex items-center justify-center mx-auto mb-4 animate-scale">
                            <i data-lucide="mail-check" class="w-8 h-8 text-success-500"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">Check your email</h2>
                        <p class="text-gray-500 mb-8">We've sent a password reset link to<br><strong class="text-gray-900">${email}</strong></p>
                        <a href="/login.html" class="btn btn-primary btn-block">Back to log in</a>
                    </div>
                `;
                lucide.createIcons();
            } catch (error) {
                Toast.error(error.message || 'Failed to send reset email');
                btn.disabled = false;
                btn.innerText = 'Reset Password';
            }
        });
    </script>
</body>
</html>
