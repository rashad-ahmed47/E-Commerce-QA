<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Profile - E-SHOP</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">E-SHOP</a>
            <div class="nav-links">
                <div id="authLinks"></div>
            </div>
        </div>
    </nav>

    <main class="container main-content max-w-4xl flex-1">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-8">Account Settings</h1>

        <div class="grid md:grid-cols-[250px_1fr] gap-8">
            <!-- Sidebar -->
            <aside class="space-y-2">
                <a href="/account.html" class="flex items-center gap-3 p-3 bg-white text-primary-600 font-bold rounded-xl shadow-sm border border-primary-100">
                    <i data-lucide="user"></i> Profile
                </a>
                <a href="/orders.html" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-100 font-medium rounded-xl transition-colors">
                    <i data-lucide="package"></i> Orders
                </a>
                <a href="/returns.html" class="flex items-center gap-3 p-3 text-gray-600 hover:bg-gray-100 font-medium rounded-xl transition-colors">
                    <i data-lucide="refresh-cw"></i> Returns
                </a>
                <button onclick="Auth.logout()" class="w-full text-left flex items-center gap-3 p-3 text-danger-600 hover:bg-red-50 font-medium rounded-xl transition-colors mt-8">
                    <i data-lucide="log-out"></i> Log Out
                </button>
            </aside>

            <!-- Main Content -->
            <div class="space-y-6">
                <div class="card p-8">
                    <h2 class="text-xl font-bold mb-6">Personal Information</h2>
                    <form id="profileForm" class="space-y-4 max-w-md">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">New Password (leave blank to keep current)</label>
                            <input type="password" id="password" class="form-input">
                        </div>
                        <button type="submit" id="saveBtn" class="btn btn-primary mt-4">Save Changes</button>
                    </form>
                </div>

                <div class="card p-8 border-red-100">
                    <h2 class="text-xl font-bold mb-2 text-danger-600">Privacy & Data (GDPR)</h2>
                    <p class="text-gray-500 text-sm mb-6">Manage your browsing history and personal data.</p>
                    
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200">
                        <div>
                            <h4 class="font-bold text-gray-900">Browsing History</h4>
                            <p class="text-xs text-gray-500">Clear your "Recently Viewed" products.</p>
                        </div>
                        <button id="clearHistoryBtn" class="btn btn-secondary btn-sm text-danger-600 border-danger-200 hover:bg-red-50">Clear Data</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.isAuthenticated()) {
                window.location.href = '/login.html?redirect=account.html';
                return;
            }
            Auth.initAuthUI();
            lucide.createIcons();

            try {
                const profile = await Utils.fetchApi('/api/auth/profile');
                document.getElementById('name').value = profile.name;
                document.getElementById('email').value = profile.email;
            } catch (error) {
                Toast.error('Failed to load profile');
            }

            // Update Profile
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('saveBtn');
                btn.disabled = true;
                btn.innerText = 'Saving...';

                const body = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value
                };
                if (document.getElementById('password').value) {
                    body.password = document.getElementById('password').value;
                }

                try {
                    const updated = await Utils.fetchApi('/api/auth/profile', {
                        method: 'PUT',
                        body: JSON.stringify(body)
                    });
                    
                    // Update local user object
                    const user = Auth.getUser();
                    user.name = updated.name;
                    user.email = updated.email;
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    Auth.initAuthUI();
                    Toast.success('Profile updated successfully');
                    document.getElementById('password').value = '';
                } catch (error) {
                    Toast.error(error.message);
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'Save Changes';
                }
            });

            // Clear History (GDPR)
            document.getElementById('clearHistoryBtn').addEventListener('click', async () => {
                if (confirm('Are you sure you want to clear your browsing history?')) {
                    try {
                        await Utils.fetchApi('/api/auth/recently-viewed', { method: 'DELETE' });
                        localStorage.removeItem('recentlyViewed');
                        Toast.success('Browsing history cleared');
                    } catch (error) {
                        Toast.error(error.message);
                    }
                }
            });
        });
    </script>
</body>
</html>
