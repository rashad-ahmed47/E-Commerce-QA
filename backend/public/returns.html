<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Returns - E-SHOP</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">E-SHOP</a>
            <div class="nav-links">
                <div id="authLinks"></div>
            </div>
        </div>
    </nav>

    <main class="container main-content max-w-5xl flex-1">
        <div class="flex items-center gap-4 mb-8">
            <a href="/account.html" class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-gray-500 hover:text-primary-600 transition-colors">
                <i data-lucide="arrow-left"></i>
            </a>
            <h1 class="text-3xl font-extrabold text-gray-900">Return Requests</h1>
        </div>

        <div id="returnsList" class="space-y-6">
            <!-- Populated by JS -->
            <div class="text-center py-12"><div class="spinner mx-auto border-primary-500"></div></div>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/returns.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Returns.initList();
        });
    </script>
</body>
</html>
