<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - E-SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm h-16 flex items-center px-8 border-b border-gray-200">
        <a href="index.html" class="font-bold text-2xl text-indigo-600">E-SHOP</a>
        <span class="ml-4 text-gray-400">/ Edit Product</span>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-12 w-full">
        <div id="loading" class="text-center py-20 text-gray-500">Loading product data...</div>
        
        <div id="editContainer" class="hidden bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <h1 class="text-2xl font-extrabold mb-6 text-gray-900">Edit Product Details</h1>
            
            <form id="editForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Product Name</label>
                        <input type="text" id="name" required class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Price ($)</label>
                        <input type="number" id="price" step="0.01" required class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Category</label>
                        <select id="category" required class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500">
                            <option value="Electronics">Electronics</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Home">Home</option>
                            <option value="Beauty">Beauty</option>
                            <option value="Sports">Sports</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Stock Quantity</label>
                        <input type="number" id="stockQuantity" required class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="description" rows="4" required class="mt-1 block w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Add More Images</label>
                    <input type="file" id="images" multiple accept="image/*" class="mt-2 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>

                <div class="flex gap-4 pt-4">
                    <a href="my-listings.html" class="flex-1 bg-gray-100 text-center py-3 rounded-xl font-bold hover:bg-gray-200 transition-all">Cancel</a>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all">Save Changes</button>
                </div>
            </form>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        async function loadProduct() {
            try {
                const res = await fetch(`/api/products/${id}`);
                const product = await res.json();
                
                document.getElementById('name').value = product.name;
                document.getElementById('price').value = product.price;
                document.getElementById('category').value = product.category;
                document.getElementById('stockQuantity').value = product.stockQuantity;
                document.getElementById('description').value = product.description;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('editContainer').classList.remove('hidden');
            } catch (err) {
                alert('Failed to load product');
            }
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('stockQuantity', document.getElementById('stockQuantity').value);
            formData.append('description', document.getElementById('description').value);
            
            const files = document.getElementById('images').files;
            for (let i = 0; i < files.length; i++) {
                formData.append('images', files[i]);
            }

            try {
                const res = await fetch(`/api/products/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${Auth.getToken()}`
                    },
                    body: formData
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Update failed');
                
                alert('Product updated successfully!');
                window.location.href = 'my-listings.html';
            } catch (err) {
                alert(err.message);
            }
        });

        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
