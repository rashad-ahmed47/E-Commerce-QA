<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - E-SHOP</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .strength-meter { height: 4px; border-radius: 2px; transition: all 0.3s; width: 0; }
        .strength-weak { width: 33%; background: var(--danger-500); }
        .strength-medium { width: 66%; background: var(--warning-500); }
        .strength-strong { width: 100%; background: var(--success-500); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-12">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black bg-opacity-40 backdrop-blur-sm z-0"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-8 animate-fade">
            <a href="/" class="text-4xl font-extrabold text-white tracking-tight">E-SHOP</a>
            <p class="text-white text-opacity-80 mt-2">Create your premium account</p>
        </div>

        <div class="glass-card p-8 animate-slide">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Join the marketplace</h2>
            
            <form id="registerForm" class="space-y-4">
                <div class="form-group">
                    <label class="form-label text-gray-700">Full Name</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="text" id="name" required class="form-input w-full pl-10" placeholder="John Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label text-gray-700">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="email" required class="form-input w-full pl-10" placeholder="you@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label text-gray-700">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="password" required class="form-input w-full pl-10 pr-10" placeholder="Min 6 characters">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="w-full bg-gray-200 h-1 mt-2 rounded-full overflow-hidden">
                        <div id="strengthMeter" class="strength-meter"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label text-gray-700">Confirm Password</label>
                    <div class="relative">
                        <i data-lucide="check-circle" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="confirmPassword" required class="form-input w-full pl-10" placeholder="Confirm your password">
                    </div>
                    <div id="passwordMatch" class="text-xs mt-1 hidden text-danger-500 font-medium">Passwords do not match</div>
                </div>

                <label class="flex items-start gap-2 mt-4 cursor-pointer">
                    <input type="checkbox" required class="mt-1 w-4 h-4 text-primary-600 rounded border-gray-300 focus:ring-primary-500">
                    <span class="text-sm text-gray-600">I agree to the <a href="#" class="text-primary-600 font-bold hover:underline">Terms of Service</a> and <a href="#" class="text-primary-600 font-bold hover:underline">Privacy Policy</a></span>
                </label>

                <button type="submit" id="registerBtn" class="btn btn-primary btn-block btn-lg mt-6 shadow-glow">
                    Create Account
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-gray-600">
                Already have an account? 
                <a href="/login.html" class="font-bold text-primary-600 hover:text-primary-700 transition-colors">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        lucide.createIcons();

        const passInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const meter = document.getElementById('strengthMeter');
        const matchText = document.getElementById('passwordMatch');

        // Toggle visibility
        document.getElementById('togglePassword').addEventListener('click', (e) => {
            const icon = e.currentTarget.querySelector('i');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });

        // Strength meter
        passInput.addEventListener('input', (e) => {
            const val = e.target.value;
            meter.className = 'strength-meter';
            if (val.length === 0) return;
            if (val.length < 6) meter.classList.add('strength-weak');
            else if (val.length < 10 || !/[A-Z]/.test(val) || !/[0-9]/.test(val)) meter.classList.add('strength-medium');
            else meter.classList.add('strength-strong');
            
            checkMatch();
        });

        confirmInput.addEventListener('input', checkMatch);

        function checkMatch() {
            if (confirmInput.value.length > 0) {
                if (passInput.value !== confirmInput.value) {
                    matchText.classList.remove('hidden');
                } else {
                    matchText.classList.add('hidden');
                }
            } else {
                matchText.classList.add('hidden');
            }
        }

        // Submit
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (passInput.value !== confirmInput.value) {
                Toast.error('Passwords do not match');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner border-white mr-2"></div> Creating account...';

            try {
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = passInput.value;
                
                await Auth.register(name, email, password);
                window.location.href = '/';
            } catch (error) {
                Toast.error(error.message || 'Registration failed');
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        });
    </script>
</body>
</html>
