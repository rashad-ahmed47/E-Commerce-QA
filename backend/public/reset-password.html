<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - E-SHOP</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: var(--gray-50); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-slide">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-extrabold text-primary-600 tracking-tight">E-SHOP</a>
        </div>

        <div class="card p-8 shadow-xl border-gray-100">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="w-8 h-8 text-primary-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Set new password</h2>
                <p class="text-gray-500 mt-2 text-sm">Your new password must be different from previously used passwords.</p>
            </div>
            
            <form id="resetForm" class="space-y-5">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" id="password" required class="form-input w-full" placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required class="form-input w-full" placeholder="Confirm your new password">
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-block btn-lg mt-6">
                    Reset Password
                </button>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/toast.js"></script>
    <script>
        lucide.createIcons();
        
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            Toast.error('Invalid or missing reset token');
            document.getElementById('submitBtn').disabled = true;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (pass !== confirm) {
                return Toast.error('Passwords do not match');
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner border-white mr-2"></div> Updating...';

            try {
                await Utils.fetchApi(`/api/auth/reset-password/${token}`, {
                    method: 'PUT',
                    body: JSON.stringify({ password: pass })
                });
                
                Toast.success('Password updated successfully!');
                setTimeout(() => window.location.href = '/login.html', 2000);
            } catch (error) {
                Toast.error(error.message || 'Failed to update password');
                btn.disabled = false;
                btn.innerText = 'Reset Password';
            }
        });
    </script>
</body>
</html>
